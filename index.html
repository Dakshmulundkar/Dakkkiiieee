<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Daksh Mulundkar — Software Engineer, Full Stack Developer, Cloud Enthusiast & AI Builder. Building premium digital products." />
    <meta name="theme-color" content="#050510" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Daksh Mulundkar | Software Engineer" />
    <meta property="og:description" content="Award-quality portfolio — Full Stack Developer, Cloud Enthusiast & AI Builder." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dakshmulundkar.dev" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>Daksh Mulundkar | Software Engineer</title>
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Daksh Mulundkar",
      "url": "https://dakshmulundkar.dev",
      "jobTitle": "Software Engineer",
      "knowsAbout": ["Full Stack Development", "Cloud Computing", "AI/ML", "DevOps"],
      "sameAs": [
        "https://github.com/Dakshmulundkar",
        "https://linkedin.com/in/dakshmulundkar"
      ]
    }
    </script>
  </head>
  <body>
    <!-- Static pre-render of the loading screen — visible immediately before JS boots.
         React's LoadingScreen will take over once it mounts. The inline styles
         exactly match the Tailwind/CSS variables so there's zero visual shift. -->
    <div id="root">
      <div id="static-loader" style="
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #050505;
        font-family: 'Space Grotesk', sans-serif;
      ">
        <!-- Progress bar -->
        <div style="
          position: absolute;
          top: 0; left: 0;
          width: 0%;
          height: 1.5px;
          background: rgba(56,189,248,0.5);
          transition: width 0.1s linear;
        "></div>

        <div style="text-align: center; padding: 0 3rem; max-width: 36rem; width: 100%;">
          <h2 style="
            font-size: clamp(1.75rem, 4vw, 2.25rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: linear-gradient(135deg,#fff 60%,rgba(255,255,255,0.5) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0 0 2rem;
          ">Daksh Mulundkar</h2>

          <div style="display:flex;align-items:center;justify-content:center;gap:2rem;opacity:0.4;">
            <span style="font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:0.6em;color:#fff;">Systems</span>
            <div style="width:1.5px;height:24px;background:rgba(255,255,255,0.1);"></div>
            <span style="font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:0.6em;color:#fff;">Architecture</span>
          </div>

          <div style="margin-top: 6rem;">
            <span id="static-loader-num" style="
              display: block;
              font-size: 1.5rem;
              font-family: monospace;
              color: rgba(255,255,255,0.2);
              letter-spacing: 0.2em;
            ">0</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
